version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: abc_crawler_backend
    ports:
      - "5500:5500"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=abc
      - DB_USER=mark
      - DB_PASS=V3nger!12
      - DB_SSLMODE=verify-full
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./run:/app/run

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: abc_tune_explorer
    ports:
      - "5501:5501"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=abc
      - DB_USER=mark
      - DB_PASS=V3nger!12
      - DB_SSLMODE=verify-full
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./run:/app/run
      - ./similar_results.json:/app/similar_results.json
